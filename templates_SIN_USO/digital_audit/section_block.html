{% load i18n %}
<div class="section-card animate-in">
  <h3 class="section-title">
    <i class="bi bi-check2-square"></i>
    {% trans title %}
  </h3>
  <div class="row g-3">
    {% for field in fields %}
      <div class="col-md-6">
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
        </div>
      </div>
    {% endfor %}
  </div>
</div>
